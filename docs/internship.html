<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Internship Details | InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8faff; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #4f46e5; }
    .navbar-brand { color: white !important; font-weight: 700; }
    .nav-link { color: rgba(255,255,255,0.85) !important; }
    .detail-card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 20px;
    }
    .badge-skill {
      background: #eef2ff;
      color: #4f46e5;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      margin: 3px;
      display: inline-block;
    }
    .badge-matched {
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      margin: 3px;
      display: inline-block;
    }
    .badge-missing {
      background: #fef2f2;
      color: #dc2626;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      margin: 3px;
      display: inline-block;
    }
    .progress { height: 12px; border-radius: 10px; }
    .progress-bar { background: #4f46e5; border-radius: 10px; }
    .info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .info-item:last-child { border-bottom: none; }
    .info-label { color: #6b7280; font-size: 0.9rem; width: 140px; }
    .info-value { font-weight: 600; }
    .btn-apply {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-weight: 600;
      font-size: 1rem;
      width: 100%;
    }
    .btn-apply:hover { background: #4338ca; color: white; }
    .btn-apply:disabled { background: #9ca3af; cursor: not-allowed; }
    .eligibility-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎯 InternHub</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="listings.html">Browse</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">My Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item" id="authButtons">
            <a href="login.html" class="btn btn-outline-light btn-sm me-2">Login</a>
          </li>
          <li class="nav-item d-none" id="logoutBtn">
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div id="mainContent">
      <div class="text-center py-5 text-muted">⏳ Loading internship details...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const user = getUser();
    if (user) {
      document.getElementById('authButtons').classList.add('d-none');
      document.getElementById('logoutBtn').classList.remove('d-none');
    }

    const urlParams = new URLSearchParams(window.location.search);
    const internshipId = urlParams.get('id');

    if (!internshipId) {
      window.location.href = 'listings.html';
    }

    let internshipData = null;

    async function loadPage() {
      internshipData = await internshipAPI.getById(internshipId);
      let skillGapData = null;
      if (user && user.role === 'student') {
        skillGapData = await profileAPI.getSkillGap(internshipId);
      }
      renderPage(internshipData, skillGapData);
    }

    function renderPage(internship, skillGap) {
      const content = document.getElementById('mainContent');

      const verifiedBadge = internship.company?.isVerified
        ? '<span style="background:#f0fdf4;color:#059669;padding:3px 10px;border-radius:20px;font-size:0.8rem;margin-left:8px">✅ Verified</span>'
        : '<span style="background:#fffbeb;color:#d97706;padding:3px 10px;border-radius:20px;font-size:0.8rem;margin-left:8px">⚠️ Unverified</span>';

      const applySection = user && user.role === 'student'
        ? `<textarea id="coverLetter" class="form-control mb-3"
            rows="4" placeholder="Write a short cover letter..."></textarea>
           <button class="btn-apply" onclick="handleApply()">
             🚀 Apply for this Internship
           </button>`
        : user && user.role === 'company'
        ? `<div class="alert alert-info">Companies cannot apply to internships.</div>`
        : `<p class="text-muted mb-3">Login as a student to apply</p>
           <a href="login.html" class="btn-apply text-center text-decoration-none d-block">
             Login to Apply
           </a>`;

      const reportSection = user && user.role === 'student'
        ? `<hr/>
           <p class="small text-muted mb-2">🚩 Suspect this is fake?</p>
           <button class="btn btn-outline-danger btn-sm w-100"
             onclick="handleReport()">
             Report this Internship
           </button>
           <div id="reportMsg" class="mt-2"></div>`
        : '';

      const skillGapSection = skillGap && !skillGap.message
        ? `<div class="detail-card">
            <h5 class="fw-bold mb-3">🧠 Your Skill Match</h5>
            <div class="d-flex justify-content-between mb-1">
              <span class="small fw-semibold">Match Score</span>
              <span class="fw-bold" style="color:#4f46e5">${skillGap.matchPercentage}%</span>
            </div>
            <div class="progress mb-3">
              <div class="progress-bar" style="width:${skillGap.matchPercentage}%"></div>
            </div>
            <div class="mb-3">
              <div class="small fw-semibold mb-1">✅ Skills You Have</div>
              ${skillGap.matchedSkills.length > 0
                ? skillGap.matchedSkills.map(s =>
                    '<span class="badge-matched">' + s + '</span>'
                  ).join('')
                : '<span class="text-muted small">None matched</span>'
              }
            </div>
            <div class="mb-3">
              <div class="small fw-semibold mb-1">❌ Skills You Need</div>
              ${skillGap.missingSkills.length > 0
                ? skillGap.missingSkills.map(s =>
                    '<span class="badge-missing">' + s + '</span>'
                  ).join('')
                : '<span class="text-success small fw-semibold">🎉 You have all skills!</span>'
              }
            </div>
            <hr/>
            <div class="d-flex gap-2 flex-wrap">
              <span class="eligibility-badge ${skillGap.cgpaEligible
                ? 'bg-success text-white' : 'bg-danger text-white'}">
                ${skillGap.cgpaEligible ? '✅ CGPA Eligible' : '❌ CGPA Too Low'}
              </span>
              <span class="eligibility-badge ${skillGap.yearEligible
                ? 'bg-success text-white' : 'bg-danger text-white'}">
                ${skillGap.yearEligible ? '✅ Batch Match' : '❌ Batch Mismatch'}
              </span>
            </div>
            ${!skillGap.eligible
              ? '<div class="alert alert-warning mt-3 small">⚠️ You may not meet all requirements but you can still apply!</div>'
              : '<div class="alert alert-success mt-3 small">🎉 You meet all requirements! Go ahead and apply.</div>'
            }
          </div>`
        : user && user.role === 'student'
        ? `<div class="detail-card">
            <h5 class="fw-bold mb-2">🧠 Skill Gap</h5>
            <p class="text-muted small">Complete your profile to see your skill match!</p>
            <a href="profile.html" class="btn btn-outline-primary btn-sm w-100">
              Complete Profile
            </a>
          </div>`
        : '';

      content.innerHTML =
        '<div class="row">' +
          '<div class="col-lg-8">' +
            '<div class="detail-card">' +
              '<div class="d-flex justify-content-between align-items-start flex-wrap gap-2">' +
                '<div>' +
                  '<h2 class="fw-bold mb-1">' + internship.title + '</h2>' +
                  '<div style="color:#4f46e5;font-weight:600;font-size:1.1rem">' +
                    '🏢 ' + (internship.company?.name || 'Company') + verifiedBadge +
                  '</div>' +
                '</div>' +
                '<div class="text-end">' +
                  '<div style="font-size:1.5rem;font-weight:800;color:#ea580c">' +
                    '₹' + (internship.stipend?.toLocaleString()) + '/mo' +
                  '</div>' +
                  '<small class="text-muted">Stipend</small>' +
                '</div>' +
              '</div>' +
              '<hr/>' +
              '<div class="info-item"><span class="info-label">📍 Location</span><span class="info-value">' + internship.location + '</span></div>' +
              '<div class="info-item"><span class="info-label">⏱️ Duration</span><span class="info-value">' + internship.duration + '</span></div>' +
              '<div class="info-item"><span class="info-label">🎓 Min CGPA</span><span class="info-value">' + internship.minCGPA + '</span></div>' +
              '<div class="info-item"><span class="info-label">📅 Batch</span><span class="info-value">' + (internship.graduationYear || 'Any') + '</span></div>' +
              '<div class="info-item"><span class="info-label">💼 Openings</span><span class="info-value">' + internship.openings + '</span></div>' +
            '</div>' +

            '<div class="detail-card">' +
              '<h5 class="fw-bold mb-3">📋 About the Internship</h5>' +
              '<p class="text-muted">' + (internship.description || 'No description provided.') + '</p>' +
            '</div>' +

            '<div class="detail-card">' +
              '<h5 class="fw-bold mb-3">🛠️ Required Skills</h5>' +
              '<div>' +
                (internship.requiredSkills?.map(s =>
                  '<span class="badge-skill">' + s + '</span>'
                ).join('') || 'Not specified') +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div class="col-lg-4">' +
            '<div class="detail-card">' +
              '<h5 class="fw-bold mb-3">Apply Now</h5>' +
              applySection +
              '<div id="applyMsg" class="mt-2"></div>' +
              reportSection +
            '</div>' +
            skillGapSection +
          '</div>' +
        '</div>';
    }

    async function handleApply() {
      const coverLetter = document.getElementById('coverLetter').value;
      const applyMsg = document.getElementById('applyMsg');
      const result = await applicationAPI.apply(internshipId, coverLetter);
      if (result.message === 'Applied successfully!') {
        applyMsg.innerHTML = '<div class="alert alert-success">✅ Applied successfully! Check your dashboard.</div>';
        document.querySelector('.btn-apply').disabled = true;
      } else {
        applyMsg.innerHTML = '<div class="alert alert-danger">❌ ' + result.message + '</div>';
      }
    }

    async function handleReport() {
      const reasons = [
        '1. Fake or non-existent company',
        '2. Suspicious stipend amount',
        '3. Asking for money or personal documents',
        '4. Misleading job description',
        '5. Other'
      ];

      const reason = prompt(
        'Why are you reporting this internship?\n\n' +
        reasons.join('\n') +
        '\n\nType your reason or select a number (1-5):'
      );

      if (!reason) return;

      const reasonMap = {
        '1': 'Fake or non-existent company',
        '2': 'Suspicious stipend amount',
        '3': 'Asking for money or personal documents',
        '4': 'Misleading job description',
        '5': 'Other'
      };

      const finalReason = reasonMap[reason.trim()] || reason;
      const result = await reportAPI.report(internshipId, finalReason);

      const reportMsg = document.getElementById('reportMsg');
      if (result.message === 'Internship reported successfully') {
        reportMsg.innerHTML = '<div class="alert alert-success small">✅ Reported! Our admin team will review within 24 hours.</div>';
      } else {
        reportMsg.innerHTML = '<div class="alert alert-danger small">❌ ' + result.message + '</div>';
      }
    }

    loadPage();
  </script>
</body>
</html>
