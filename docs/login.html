<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo mb-1">🎯 InternHub</div>
      <div class="auth-title">Welcome back 👋</div>
      <div class="auth-subtitle">Sign in to your account to continue</div>

      <div id="errorMsg" class="alert alert-danger d-none py-2 small"></div>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••"/>
      </div>

      <button class="btn-auth mb-3" onclick="handleLogin()">Sign In</button>

      <p class="text-center mb-0" style="font-size:0.86rem;color:var(--gray-600)">
        Don't have an account?
        <a href="register.html" style="color:var(--primary);font-weight:700">Create one</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();
    async function handleLogin() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      if (!email || !password) {
        errorMsg.classList.remove('d-none');
        errorMsg.textContent = 'Please fill in all fields';
        return;
      }
      errorMsg.classList.add('d-none');
      try {
        const data = await authAPI.login({ email, password });
        if (data.token) {
          saveAuth(data);
          if (data.user.role === 'company') window.location.href = 'company-dashboard.html';
          else if (data.user.role === 'admin') window.location.href = 'admin.html';
          else window.location.href = 'index.html';
        } else {
          errorMsg.classList.remove('d-none');
          errorMsg.textContent = data.message || 'Login failed';
        }
      } catch {
        errorMsg.classList.remove('d-none');
        errorMsg.textContent = 'Server error. Please try again.';
      }
    }
    document.addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
