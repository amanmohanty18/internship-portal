<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Internships | InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎯 Intern<span>Hub</span></a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-center gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">My Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item d-none" id="adminNav"><a class="nav-link" href="admin.html">⚙️ Admin</a></li>
          <li class="nav-item ms-2" id="authButtons">
            <a href="login.html" class="btn-nav-login me-2">Login</a>
            <a href="register.html" class="btn-nav-register">Register</a>
          </li>
          <li class="nav-item ms-2 d-none" id="logoutBtn">
            <button class="btn-nav-logout" onclick="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row">

      <!-- Filters Sidebar -->
      <div class="col-lg-3 mb-4">
        <div class="filter-card">
          <h6 class="fw-bold mb-3">🔧 FILTERS</h6>

          <div class="mb-3">
            <label class="form-label small fw-semibold">Role / Title</label>
            <select id="filterRole" class="form-control form-control-sm">
              <option value="">All Roles</option>
              <option value="Frontend Developer Intern">Frontend Developer Intern</option>
              <option value="Backend Developer Intern">Backend Developer Intern</option>
              <option value="Full Stack Developer Intern">Full Stack Developer Intern</option>
              <option value="React Developer Intern">React Developer Intern</option>
              <option value="Node.js Developer Intern">Node.js Developer Intern</option>
              <option value="Android Developer Intern">Android Developer Intern</option>
              <option value="iOS Developer Intern">iOS Developer Intern</option>
              <option value="Flutter Developer Intern">Flutter Developer Intern</option>
              <option value="Mobile App Developer Intern">Mobile App Developer Intern</option>
              <option value="Data Analyst Intern">Data Analyst Intern</option>
              <option value="Data Science Intern">Data Science Intern</option>
              <option value="Machine Learning Intern">Machine Learning Intern</option>
              <option value="AI Intern">AI Intern</option>
              <option value="Business Intelligence Intern">Business Intelligence Intern</option>
              <option value="IoT Developer Intern">IoT Developer Intern</option>
              <option value="Blockchain Developer Intern">Blockchain Developer Intern</option>
              <option value="Cyber Security Intern">Cyber Security Intern</option>
              <option value="Cloud Computing Intern">Cloud Computing Intern</option>
              <option value="UI/UX Designer Intern">UI/UX Designer Intern</option>
              <option value="Graphic Designer Intern">Graphic Designer Intern</option>
              <option value="Product Designer Intern">Product Designer Intern</option>
              <option value="Marketing Intern">Marketing Intern</option>
              <option value="Digital Marketing Intern">Digital Marketing Intern</option>
              <option value="Content Writing Intern">Content Writing Intern</option>
              <option value="HR Intern">HR Intern</option>
              <option value="Operations Intern">Operations Intern</option>
              <option value="Business Development Intern">Business Development Intern</option>
              <option value="Sales Intern">Sales Intern</option>
              <option value="Software Engineer Intern">Software Engineer Intern</option>
              <option value="QA Tester Intern">QA Tester Intern</option>
              <option value="DevOps Intern">DevOps Intern</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-semibold">Location</label>
            <select id="filterLocation" class="form-control form-control-sm">
              <option value="">All Locations</option>
              <option value="Remote">🌐 Remote</option>
              <option value="Bangalore">Bangalore</option>
              <option value="Hyderabad">Hyderabad</option>
              <option value="Pune">Pune</option>
              <option value="Chennai">Chennai</option>
              <option value="Mumbai">Mumbai</option>
              <option value="Delhi">Delhi</option>
              <option value="Noida">Noida</option>
              <option value="Gurgaon">Gurgaon</option>
              <option value="Kolkata">Kolkata</option>
              <option value="Ahmedabad">Ahmedabad</option>
              <option value="Jaipur">Jaipur</option>
              <option value="Chandigarh">Chandigarh</option>
              <option value="Indore">Indore</option>
              <option value="Bhopal">Bhopal</option>
              <option value="Lucknow">Lucknow</option>
              <option value="Kanpur">Kanpur</option>
              <option value="Nagpur">Nagpur</option>
              <option value="Surat">Surat</option>
              <option value="Vadodara">Vadodara</option>
              <option value="Coimbatore">Coimbatore</option>
              <option value="Visakhapatnam">Visakhapatnam</option>
              <option value="Patna">Patna</option>
              <option value="Ranchi">Ranchi</option>
              <option value="Bhubaneswar">Bhubaneswar</option>
              <option value="Mysore">Mysore</option>
              <option value="Trivandrum">Trivandrum</option>
              <option value="Kochi">Kochi</option>
              <option value="Madurai">Madurai</option>
              <option value="Guwahati">Guwahati</option>
              <option value="Dehradun">Dehradun</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-semibold">Min Stipend (₹)</label>
            <input type="number" id="filterStipend" class="form-control form-control-sm" placeholder="e.g. 5000"/>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-semibold">Graduation Year</label>
            <select id="filterYear" class="form-control form-control-sm">
              <option value="">All Years</option>
              <option value="2025">2025</option>
              <option value="2026">2026</option>
              <option value="2027">2027</option>
              <option value="2028">2028</option>
              <option value="2029">2029</option>
            </select>
          </div>

          <button class="btn btn-primary btn-sm w-100" onclick="applyFilters()">Apply Filters</button>
          <button class="btn btn-outline-secondary btn-sm w-100 mt-2" onclick="clearFilters()">Clear</button>
        </div>
      </div>

      <!-- Results -->
      <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold mb-0" id="resultsTitle">All Internships</h5>
          <span class="text-muted small" id="resultsCount"></span>
        </div>

        <div id="internshipList">
          <div class="loading">⏳ Loading internships...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Show/hide nav
    const user = getUser();
    if (user) {
      document.getElementById('authButtons').classList.add('d-none');
      document.getElementById('logoutBtn').classList.remove('d-none');
      if (user.role === 'admin') {
        document.getElementById('adminNav').classList.remove('d-none');
      }
    }

    // Get URL params
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('role')) document.getElementById('filterRole').value = urlParams.get('role');
    if (urlParams.get('location')) document.getElementById('filterLocation').value = urlParams.get('location');
    if (urlParams.get('graduationYear')) document.getElementById('filterYear').value = urlParams.get('graduationYear');

    // Load internships on page load
    loadInternships();

    async function loadInternships() {
      const filters = {
        role: document.getElementById('filterRole').value,
        location: document.getElementById('filterLocation').value,
        minStipend: document.getElementById('filterStipend').value,
        graduationYear: document.getElementById('filterYear').value
      };

      // Remove empty filters
      Object.keys(filters).forEach(k => !filters[k] && delete filters[k]);

      const internships = await internshipAPI.search(filters);
      renderInternships(internships);
    }

    function renderInternships(internships) {
      const list = document.getElementById('internshipList');
      const count = document.getElementById('resultsCount');

      if (!internships || internships.length === 0) {
        list.innerHTML = `
          <div class="no-results">
            <div style="font-size:3rem">🔍</div>
            <h5 class="mt-3">No internships found</h5>
            <p>Try changing your filters or search term</p>
          </div>`;
        count.textContent = '';
        return;
      }

      count.textContent = `${internships.length} internship(s) found`;

      list.innerHTML = internships.map(i => `
        <a class="internship-card" href="internship.html?id=${i._id}">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h5 class="fw-bold mb-1">${i.title}</h5>
              
              <div class="company-name mb-2">
                🏢 ${i.company?.name || 'Company'}
                ${i.company?.isVerified
                  ? '<span style="background:#f0fdf4;color:#059669;padding:2px 8px;border-radius:20px;font-size:0.75rem;margin-left:6px">✅ Verified</span>'
                  : '<span style="background:#fffbeb;color:#d97706;padding:2px 8px;border-radius:20px;font-size:0.75rem;margin-left:6px">⚠️ Unverified</span>'
                }
              </div>

            </div>
            <span class="badge-stipend">₹${i.stipend?.toLocaleString()}/month</span>
          </div>

          <div class="d-flex flex-wrap gap-2 mb-2">
            <span class="badge-location">📍 ${i.location}</span>
            <span class="badge-stipend">⏱️ ${i.duration}</span>
            <span class="badge-skill">Min CGPA: ${i.minCGPA}</span>
            ${i.graduationYear ? `<span class="badge-skill">Batch: ${i.graduationYear}</span>` : ''}
          </div>

          <div class="mt-2">
            ${i.requiredSkills?.map(s => `<span class="badge-skill">${s}</span>`).join('') || ''}
          </div>

          <div class="mt-2 text-muted small">
            🕐 Posted ${new Date(i.createdAt).toLocaleDateString()}
          </div>
        </a>
      `).join('');
    }

    function applyFilters() {
      loadInternships();
    }

    function clearFilters() {
      document.getElementById('filterRole').value = '';
      document.getElementById('filterLocation').value = '';
      document.getElementById('filterStipend').value = '';
      document.getElementById('filterYear').value = '';
      loadInternships();
    }
  </script>
</body>
</html>
