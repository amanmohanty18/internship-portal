<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Dashboard | InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet"/>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎯 Intern<span>Hub</span></a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center gap-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="company-profile.html">My Profile</a></li>
                    <li class="nav-item ms-2">
                        <button class="btn-nav-logout" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0" id="companyName">Company Dashboard</h4>
                <p class="text-muted mb-0">Manage your internships and applications</p>
            </div>
            <a href="post-internship.html" class="btn btn-primary">
                + Post New Internship
            </a>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalInternships">0</div>
                    <div class="stat-label">Internships Posted</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalApplications">0</div>
                    <div class="stat-label">Total Applications</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="shortlistedCount" style="color:#d97706">0</div>
                    <div class="stat-label">Shortlisted</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="selectedCount" style="color:#059669">0</div>
                    <div class="stat-label">Selected</div>
                </div>
            </div>
        </div>

        <!-- Applications by Internship -->
        <h5 class="fw-bold mb-3">📋 Applications Received</h5>
        <div id="applicationsList">
            <div class="text-center py-5 text-muted">⏳ Loading...</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        requireAuth();
        const user = getUser();
        if (!user || user.role !== 'company') {
            window.location.href = 'index.html';
        }
        document.getElementById('companyName').textContent = `Welcome, ${user.name}! 🏢`;

        // Track all apps in memory so stats can be updated live
        let allApps = [];

        async function loadDashboard() {
            const myInternships = await internshipAPI.getMine();

            document.getElementById('totalInternships').textContent = myInternships.length;
            document.getElementById('applicationsList').innerHTML = '';

            if (!Array.isArray(myInternships) || myInternships.length === 0) {
                document.getElementById('applicationsList').innerHTML = `
          <div class="text-center py-5 text-muted">
            <div style="font-size:3rem">📭</div>
            <h5 class="mt-3">No internships posted yet</h5>
            <a href="post-internship.html" class="btn btn-primary mt-2">
              Post Your First Internship
            </a>
          </div>`;
                return;
            }

            allApps = [];
            for (const internship of myInternships) {
                try {
                    const apps = await getApplicationsByInternship(internship._id);
                    const appsArray = Array.isArray(apps) ? apps : [];
                    allApps = allApps.concat(appsArray);
                    renderInternshipSection(internship, appsArray);
                } catch (err) {
                    renderInternshipSection(internship, []);
                }
            }
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalApplications').textContent = allApps.length;
            document.getElementById('shortlistedCount').textContent =
                allApps.filter(a => a.status === 'shortlisted').length;
            document.getElementById('selectedCount').textContent =
                allApps.filter(a => a.status === 'selected').length;
        }

        async function getApplicationsByInternship(internshipId) {
            const res = await fetch(`/api/applications/internship/${internshipId}`,
                { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } }
            );
            return res.json();
        }
        function renderInternshipSection(internship, apps) {
            const list = document.getElementById('applicationsList');

            const section = document.createElement('div');
            section.className = 'internship-section';
            section.innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
    <h6 class="fw-bold mb-0">${internship.title}</h6>
    <small class="text-muted">📍 ${internship.location} &nbsp;|&nbsp;
      ₹${internship.stipend?.toLocaleString()}/month</small>
  </div>
  <div class="d-flex gap-2 align-items-center">
    <span class="badge bg-primary">${apps.length} applications</span>
    <button class="btn btn-outline-primary btn-sm"
      onclick="editInternship('${internship._id}')">
      ✏️ Edit
    </button>
    <button class="btn btn-outline-danger btn-sm"
      onclick="deleteInternship('${internship._id}', this)">
      🗑️ Delete
    </button>
     </div>
  </div>
        ${apps.length === 0 ? `
          <p class="text-muted small">No applications yet for this internship.</p>
        ` : apps.map(app => `
          <div class="app-row" id="app-${app._id}">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-semibold">
                  👤 ${app.student?.name || 'Student'}
                </div>
                <div class="text-muted small">
                  ${app.student?.email || ''}
                </div>
                ${app.coverLetter ? `
                  <div class="text-muted small mt-1">
                    💬 "${app.coverLetter.substring(0, 80)}${app.coverLetter.length > 80 ? '...' : ''}"
                  </div>` : ''}

                <div class="text-muted small mt-1">
                  ${app.student?.profile?.college ? `🏫 ${app.student.profile.college}` : ''}
                  ${app.student?.profile?.branch ? ` &nbsp;|&nbsp; ${app.student.profile.branch}` : ''}
                  ${app.student?.profile?.cgpa ? ` &nbsp;|&nbsp; CGPA: ${app.student.profile.cgpa}` : ''}
                </div>

                ${app.student?.profile?.skills?.length ? `
                <div class="mt-1">
                  ${app.student.profile.skills.map(s => `<span style="background:#eef2ff;color:#4f46e5;border-radius:20px;padding:2px 8px;font-size:0.75rem;margin:2px;display:inline-block">${s}</span>`).join('')}
                </div>` : ''}

                ${app.student?.profile?.resumeUrl ? `
                <div class="mt-2">
                  <a href="${app.student.profile.resumeUrl}" target="_blank"
                    class="btn btn-outline-secondary btn-sm">
                    📄 View Resume
                  </a>
                </div>` : '<div class="text-muted small mt-1">⚠️ No resume uploaded</div>'}



                <div class="text-muted small mt-1">
                  🕐 Applied ${new Date(app.createdAt).toLocaleDateString()}
                </div>
              </div>
              <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="status-badge status-${app.status}"
                  id="status-${app._id}">
                  ${capitalize(app.status)}
                </span>
                <button class="action-btn btn-shortlist"
                  onclick="updateStatus('${app._id}', 'shortlisted')">
                  ⭐ Shortlist
                </button>
                <button class="action-btn btn-select"
                  onclick="updateStatus('${app._id}', 'selected')">
                  🎉 Select
                </button>
                <button class="action-btn btn-reject"
                  onclick="updateStatus('${app._id}', 'rejected')">
                  ❌ Reject
                </button>
              </div>
            </div>
          </div>
        `).join('')}
      `;
            list.appendChild(section);
        }
        async function updateStatus(appId, status) {
            const res = await fetch(`/api/applications/${appId}/status`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ status })
            });
            const data = await res.json();
            if (data.application) {
                // Update badge in UI
                const badge = document.getElementById(`status-${appId}`);
                badge.className = `status-badge status-${status}`;
                badge.textContent = capitalize(status);

                // Update in-memory allApps and recalculate stats
                const app = allApps.find(a => a._id === appId);
                if (app) app.status = status;
                updateStats();
            } else {
                alert('\u274c Failed to update: ' + (data.message || 'Unknown error'));
            }
        }
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
        
        async function deleteInternship(id, btn) {
           if (!confirm('Are you sure you want to delete this internship?')) return;

           const result = await internshipAPI.delete(id);
           if (result.message === 'Internship deleted successfully') {
             // Remove the section from UI
             btn.closest('.internship-section').remove();
             alert('✅ Internship deleted!');
           } else {
             alert('❌ Failed to delete: ' + result.message);
           }
        }

        function editInternship(id) {
          window.location.href = `edit-internship.html?id=${id}`;
        }
        loadDashboard();
    </script>
</body>
</html>
