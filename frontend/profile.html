<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile | InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
  <style>
    .btn-save { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: var(--radius-sm); padding: 12px 32px; font-weight: 700; font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: var(--transition); }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
    .skill-cat-btn { background: var(--gray-100); border: 1.5px solid var(--gray-200); color: var(--gray-600); border-radius: 50px; padding: 4px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: 'Inter', sans-serif; }
    .skill-cat-btn:hover, .skill-cat-btn.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary-dark); }
    .skill-chip { display: inline-block; background: var(--gray-100); border: 1.5px solid var(--gray-200); color: var(--gray-700); border-radius: 50px; padding: 4px 12px; font-size: 0.8rem; font-weight: 500; margin: 3px; cursor: pointer; transition: var(--transition); font-family: 'Inter', sans-serif; }
    .skill-chip:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary-dark); }
    .skill-chip.added { background: var(--primary); border-color: var(--primary); color: white; }
    #skillPicker::-webkit-scrollbar { width: 4px; }
    #skillPicker::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎯 Intern<span>Hub</span></a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-center gap-1">
          <li class="nav-item"><a class="nav-link" href="listings.html">Browse</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item d-none" id="adminNav"><a class="nav-link" href="admin.html">⚙️ Admin</a></li>
          <li class="nav-item ms-2">
            <button class="btn-nav-logout" onclick="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4" style="max-width:700px">

    <!-- Profile Header -->
    <div class="profile-card mb-4">
      <div class="d-flex align-items-center gap-3 mb-3">
        <div class="avatar" id="avatarText">?</div>
        <div>
          <h4 class="fw-bold mb-0" id="userName">Loading...</h4>
          <span class="text-muted" id="userEmail"></span>
        </div>
      </div>
      <div id="profileStatus" class="alert alert-warning mb-0">
        ⚠️ Complete your profile to get skill gap analysis!
      </div>
    </div>

    <!-- Profile Form -->
    <div class="profile-card">
      <h5 class="fw-bold mb-4">📝 Edit Profile</h5>

      <div id="successMsg" class="alert alert-success d-none"></div>
      <div id="errorMsg" class="alert alert-danger d-none"></div>

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">CGPA</label>
          <input type="number" id="cgpa" class="form-control" placeholder="e.g. 8.5" min="0" max="10" step="0.1"/>
        </div>

        <div class="col-md-6">
          <label class="form-label">Graduation Year</label>
          <select id="graduationYear" class="form-control">
            <option value="">Select Year</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Branch</label>
          <select id="branch" class="form-control">
            <option value="">Select Branch</option>
            <optgroup label="Computer Science">
              <option value="CSE">CSE — Computer Science & Engineering</option>
              <option value="CSE (IT)">CSE — Information Technology</option>
              <option value="CSE (AI/ML)">CSE — Artificial Intelligence & ML</option>
              <option value="CSE (Data Science)">CSE — Data Science</option>
              <option value="CSE (Cyber Security)">CSE — Cyber Security</option>
              <option value="CSE (IoT)">CSE — Internet of Things</option>
              <option value="CSE (Cloud Computing)">CSE — Cloud Computing</option>
              <option value="CSE (Blockchain)">CSE — Blockchain Technology</option>
              <option value="CSE (Full Stack)">CSE — Full Stack Development</option>
            </optgroup>
            <optgroup label="Electronics">
              <option value="ECE">ECE — Electronics & Communication</option>
              <option value="EEE">EEE — Electrical & Electronics</option>
              <option value="EE">EE — Electrical Engineering</option>
            </optgroup>
            <optgroup label="Mechanical & Civil">
              <option value="Mechanical">Mechanical Engineering</option>
              <option value="Civil">Civil Engineering</option>
              <option value="Aerospace">Aerospace Engineering</option>
            </optgroup>
            <optgroup label="Management & Others">
              <option value="MBA">MBA — Business Administration</option>
              <option value="BCA">BCA — Computer Applications</option>
              <option value="MCA">MCA — Computer Applications</option>
              <option value="B.Sc CS">B.Sc — Computer Science</option>
              <option value="B.Sc IT">B.Sc — Information Technology</option>
              <option value="B.Com">B.Com — Commerce</option>
              <option value="BBA">BBA — Business Administration</option>
            </optgroup>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">College</label>
          <input type="text" id="college" class="form-control" placeholder="e.g. MIT Pune"/>
        </div>

        <div class="col-12">
          <label class="form-label">Bio</label>
          <textarea id="bio" class="form-control" rows="3" placeholder="Tell companies about yourself..."></textarea>
        </div>

        <!-- Skills -->
        <div class="col-12">
          <label class="form-label">Skills</label>
          <div class="d-flex flex-wrap gap-2 mb-3">
            <button type="button" class="skill-cat-btn active" onclick="filterSkills(event,'all')">All</button>
            <button type="button" class="skill-cat-btn" onclick="filterSkills(event,'web')">Web Dev</button>
            <button type="button" class="skill-cat-btn" onclick="filterSkills(event,'mobile')">Mobile</button>
            <button type="button" class="skill-cat-btn" onclick="filterSkills(event,'data')">Data & AI</button>
            <button type="button" class="skill-cat-btn" onclick="filterSkills(event,'devops')">DevOps</button>
            <button type="button" class="skill-cat-btn" onclick="filterSkills(event,'design')">Design</button>
            <button type="button" class="skill-cat-btn" onclick="filterSkills(event,'other')">Other</button>
          </div>
          <div id="skillPicker" class="mb-3" style="max-height:160px;overflow-y:auto;padding:4px 0"></div>
          <div id="skillTags" class="mb-1"></div>
          <small class="text-muted">Click a skill to add it. Click × on a tag to remove it.</small>
        </div>

        <!-- Resume -->
        <div class="col-12">
          <label class="form-label">Resume (PDF only, max 5MB)</label>
          <div class="d-flex gap-2 align-items-center">
            <input type="file" id="resumeFile" class="form-control" accept=".pdf"/>
            <button class="btn btn-outline-primary" onclick="uploadResume()">📄 Upload</button>
          </div>
          <div id="resumeStatus" class="mt-2"></div>
          <div id="currentResume" class="mt-2"></div>
        </div>

      </div>

      <div class="mt-4">
        <button class="btn-save" onclick="saveProfile()">💾 Save Profile</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();

    const user = getUser();
    if (user && user.role === 'admin') document.getElementById('adminNav').classList.remove('d-none');
    let skills = [];
    let currentCategory = 'all';

    if (user) {
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('avatarText').textContent = user.name.charAt(0).toUpperCase();
    }

    // ── SKILL DATA ──
    const allSkills = {
      web:    ['HTML','CSS','JavaScript','TypeScript','React','Vue.js','Angular','Next.js','Bootstrap','Tailwind CSS','jQuery','Node.js','Express.js','REST API','GraphQL','PHP','WordPress'],
      mobile: ['Android','Kotlin','Java','Swift','iOS','Flutter','Dart','React Native','Firebase','XML'],
      data:   ['Python','R','SQL','Pandas','NumPy','Scikit-learn','TensorFlow','PyTorch','Keras','Machine Learning','Deep Learning','NLP','OpenCV','Power BI','Tableau','Excel','Data Analysis','Statistics'],
      devops: ['Git','GitHub','Docker','Kubernetes','Jenkins','AWS','Azure','GCP','Linux','Bash','CI/CD','Terraform','Ansible','MongoDB','MySQL','PostgreSQL','Redis'],
      design: ['Figma','Adobe XD','Sketch','Photoshop','Illustrator','Canva','CorelDRAW','Wireframing','Prototyping','UI Design','UX Research'],
      other:  ['Communication','MS Office','Problem Solving','Leadership','Teamwork','SEO','Content Writing','Digital Marketing','Google Ads','Social Media','Salesforce','CRM','Negotiation','Recruitment']
    };

    function filterSkills(e, cat) {
      currentCategory = cat;
      document.querySelectorAll('.skill-cat-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      renderSkillPicker();
    }

    function renderSkillPicker() {
      const pool = currentCategory === 'all' ? Object.values(allSkills).flat() : allSkills[currentCategory];
      document.getElementById('skillPicker').innerHTML = pool.map(s =>
        `<span class="skill-chip ${skills.includes(s) ? 'added' : ''}" onclick="toggleSkill('${s.replace(/'/g,"\\'")}')">
          ${skills.includes(s) ? '✓ ' : '+ '}${s}
        </span>`
      ).join('');
    }

    function toggleSkill(skill) {
      skills = skills.includes(skill) ? skills.filter(s => s !== skill) : [...skills, skill];
      renderSkills();
      renderSkillPicker();
    }

    function renderSkills() {
      document.getElementById('skillTags').innerHTML = skills.map((s, i) =>
        `<span class="skill-tag">${s}<span class="remove" onclick="removeSkill(${i})">×</span></span>`
      ).join('');
    }

    function removeSkill(i) {
      skills.splice(i, 1);
      renderSkills();
      renderSkillPicker();
    }

    // ── LOAD PROFILE ──
    async function loadProfile() {
      const profile = await profileAPI.getMe();
      if (profile && !profile.message) {
        document.getElementById('cgpa').value = profile.cgpa || '';
        document.getElementById('graduationYear').value = profile.graduationYear || '';
        document.getElementById('branch').value = profile.branch || '';
        document.getElementById('college').value = profile.college || '';
        document.getElementById('bio').value = profile.bio || '';
        skills = profile.skills || [];
        renderSkills();
        renderSkillPicker();

        if (profile.resumeUrl) {
          document.getElementById('currentResume').innerHTML = `
            <div class="alert alert-info small d-flex justify-content-between align-items-center">
              <span>📄 Current Resume: <a href="${profile.resumeUrl}" target="_blank" class="ms-2 fw-bold">View Resume</a></span>
              <button class="btn btn-outline-danger btn-sm" onclick="deleteResume()">🗑️ Delete</button>
            </div>`;
        }

        document.getElementById('profileStatus').className = 'alert alert-success mb-0';
        document.getElementById('profileStatus').textContent = '✅ Profile complete! You can see skill gap on internship pages.';
      }
      // if null, form stays empty and user fills it in
    }

    // ── SAVE PROFILE ──
    async function saveProfile() {
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');
      successMsg.classList.add('d-none');
      errorMsg.classList.add('d-none');

      const cgpaVal = document.getElementById('cgpa').value;
      const yearVal = document.getElementById('graduationYear').value;
      const branch  = document.getElementById('branch').value;
      const college = document.getElementById('college').value;

      if (!cgpaVal || !yearVal || !branch || !college) {
        errorMsg.classList.remove('d-none');
        errorMsg.textContent = 'Please fill in CGPA, Graduation Year, Branch and College.';
        return;
      }

      const data = {
        cgpa: parseFloat(cgpaVal),
        graduationYear: parseInt(yearVal),
        branch,
        college,
        bio: document.getElementById('bio').value,
        skills
      };

      try {
        const result = await profileAPI.save(data);
        if (result.profile) {
          successMsg.classList.remove('d-none');
          successMsg.textContent = '✅ Profile saved successfully!';
          document.getElementById('profileStatus').className = 'alert alert-success mb-0';
          document.getElementById('profileStatus').textContent = '✅ Profile complete!';
        } else {
          errorMsg.classList.remove('d-none');
          errorMsg.textContent = result.message || 'Failed to save profile';
        }
      } catch (err) {
        errorMsg.classList.remove('d-none');
        errorMsg.textContent = 'Server error. Please try again.';
      }
    }

    // ── RESUME ──
    async function uploadResume() {
      const fileInput = document.getElementById('resumeFile');
      const resumeStatus = document.getElementById('resumeStatus');
      if (!fileInput.files[0]) {
        resumeStatus.innerHTML = '<div class="alert alert-warning small">Please select a PDF file first!</div>';
        return;
      }
      const formData = new FormData();
      formData.append('resume', fileInput.files[0]);
      resumeStatus.innerHTML = '<div class="alert alert-info small">⏳ Uploading...</div>';
      const res = await fetch('/api/upload', { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: formData });
      const data = await res.json();
      if (data.resumeUrl) {
        resumeStatus.innerHTML = `<div class="alert alert-success small">✅ Resume uploaded! <a href="${data.resumeUrl}" target="_blank" class="ms-2">View</a></div>`;
      } else {
        resumeStatus.innerHTML = `<div class="alert alert-danger small">❌ ${data.message}</div>`;
      }
    }

    async function deleteResume() {
      if (!confirm('Delete your resume?')) return;
      const resumeStatus = document.getElementById('resumeStatus');
      resumeStatus.innerHTML = '<div class="alert alert-info small">⏳ Deleting...</div>';
      const res = await fetch('/api/upload', { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
      const data = await res.json();
      if (data.message === 'Resume deleted successfully') {
        document.getElementById('currentResume').innerHTML = '';
        document.getElementById('resumeFile').value = '';
        resumeStatus.innerHTML = '<div class="alert alert-success small">✅ Resume deleted!</div>';
        setTimeout(() => resumeStatus.innerHTML = '', 3000);
      } else {
        resumeStatus.innerHTML = `<div class="alert alert-danger small">❌ ${data.message}</div>`;
      }
    }

    loadProfile();
    renderSkillPicker();
  </script>
</body>
</html>
